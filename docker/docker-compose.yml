services:
  mysql:
    image: mysql:8.0
    container_name: streamflix-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: streamflix
      MYSQL_USER: streamflix
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - streamflix-net

  redis:
    image: redis:7-alpine
    container_name: streamflix-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - streamflix-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: streamflix-backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/streamflix?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: streamflix
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      STREAM_TOKEN_SECRET: ${STREAM_TOKEN_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - streamflix-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: streamflix-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - streamflix-net

  nginx:
    image: nginx:alpine
    container_name: streamflix-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - streamflix-net

volumes:
  mysql_data:
  redis_data:

networks:
  streamflix-net:
    driver: bridge
